name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx2048m'
  DOCKER_REGISTRY: ghcr.io

jobs:
  # ============================================
  # 1. СБОРКА
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile -DskipTests

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: classes
          path: |
            target/classes/
            target/generated-sources/

  # ============================================
  # 2. UNIT ТЕСТЫ
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests
        run: |
          mvn test \
            -Dtest="**/*Test.java" \
            -DexcludedGroups="integration,performance" \
            -DfailIfNoTests=false

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

  # ============================================
  # 3. ИНТЕГРАЦИОННЫЕ ТЕСТЫ (с Testcontainers)
  # ============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Integration Tests
        run: |
          mvn verify \
            -Dtest="**/*IntegrationTest.java" \
            -Dgroups="integration" \
            -Dspring.profiles.active=test \
            -DfailIfNoTests=false

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

  # ============================================
  # 4. PERFORMANCE ТЕСТЫ
  # ============================================
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Performance Tests
        run: |
          mvn test \
            -Dtest="**/*PerformanceTest.java" \
            -Dgroups="performance" \
            -Dspring.profiles.active=test \
            -DfailIfNoTests=false

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Performance Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

  # ============================================
  # 5. STATIC ANALYSIS (SonarCloud)
  # ============================================
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar -Pci

      - name: Upload Sonar report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sonar-report
          path: target/sonar/

  # ============================================
  # 6. DOCKER BUILD & PUSH
  # ============================================
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ sonarcloud ]
    if: github.event_name != 'pull_request'
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ============================================
  # 7. DEPLOY TO DEV
  # ============================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: dev
      url: https://dev.llm-rag-spring.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Dev
        run: |
          echo "Deploying to development environment..."
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} \
            "docker pull ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}:latest && \
             docker-compose -f /opt/app/docker-compose.yml up -d --no-deps --build app"

      - name: Health check
        run: |
          sleep 30
          curl -f https://dev.llm-rag-spring.example.com/actuator/health || exit 1

  # ============================================
  # 8. DEPLOY TO PRODUCTION (Manual)
  # ============================================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ docker-build, deploy-dev ]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://llm-rag-spring.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "docker pull ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}:latest && \
             docker-compose -f /opt/app/docker-compose.yml up -d --no-deps --build app"

      - name: Health check
        run: |
          sleep 30
          curl -f https://llm-rag-spring.example.com/actuator/health || exit 1