<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>🌸 RAG Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap"
          rel="stylesheet">
    <style>
        /* --- Общие стили --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* --- Цветочный фон --- */
        .flowers-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .flower {
            position: absolute;
            font-size: 3rem;
            opacity: 0.25;
            animation: floatFlower 15s ease-in-out infinite alternate;
        }

        .flower:nth-child(1) {
            top: 5%;
            left: 3%;
            font-size: 4rem;
            animation-delay: 0s;
        }

        .flower:nth-child(2) {
            top: 15%;
            right: 5%;
            font-size: 3.5rem;
            animation-delay: 2s;
        }

        .flower:nth-child(3) {
            top: 45%;
            left: 2%;
            font-size: 5rem;
            animation-delay: 4s;
        }

        .flower:nth-child(4) {
            top: 70%;
            right: 3%;
            font-size: 4.5rem;
            animation-delay: 1s;
        }

        .flower:nth-child(5) {
            bottom: 10%;
            left: 10%;
            font-size: 3rem;
            animation-delay: 3s;
        }

        .flower:nth-child(6) {
            top: 30%;
            right: 1%;
            font-size: 2.5rem;
            animation-delay: 5s;
        }

        .flower:nth-child(7) {
            bottom: 25%;
            right: 15%;
            font-size: 4rem;
            animation-delay: 2.5s;
        }

        .flower:nth-child(8) {
            top: 55%;
            left: 8%;
            font-size: 3.2rem;
            animation-delay: 4.5s;
        }

        @keyframes floatFlower {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            33% {
                transform: translate(15px, -20px) rotate(10deg) scale(1.05);
            }
            66% {
                transform: translate(-10px, 15px) rotate(-5deg) scale(0.95);
            }
            100% {
                transform: translate(5px, -10px) rotate(5deg) scale(1.02);
            }
        }

        /* --- Падающие лепестки --- */
        .petals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            top: -20px;
            font-size: 1.2rem;
            opacity: 0.4;
            animation: fallPetal linear infinite;
        }

        .petal:nth-child(1) {
            left: 10%;
            animation-duration: 12s;
            animation-delay: 0s;
            font-size: 1rem;
        }

        .petal:nth-child(2) {
            left: 25%;
            animation-duration: 15s;
            animation-delay: 2s;
            font-size: 1.4rem;
        }

        .petal:nth-child(3) {
            left: 40%;
            animation-duration: 10s;
            animation-delay: 4s;
            font-size: 0.8rem;
        }

        .petal:nth-child(4) {
            left: 55%;
            animation-duration: 18s;
            animation-delay: 1s;
            font-size: 1.1rem;
        }

        .petal:nth-child(5) {
            left: 70%;
            animation-duration: 14s;
            animation-delay: 3s;
            font-size: 1.3rem;
        }

        .petal:nth-child(6) {
            left: 85%;
            animation-duration: 11s;
            animation-delay: 5s;
            font-size: 0.9rem;
        }

        .petal:nth-child(7) {
            left: 15%;
            animation-duration: 16s;
            animation-delay: 2.5s;
            font-size: 1.5rem;
        }

        .petal:nth-child(8) {
            left: 50%;
            animation-duration: 13s;
            animation-delay: 3.5s;
            font-size: 1rem;
        }

        @keyframes fallPetal {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.5;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* --- Контейнер --- */
        .container {
            position: relative;
            z-index: 2;
            padding-top: 40px;
            padding-bottom: 60px;
            max-width: 100%;
        }

        /* --- Карточка --- */
        .card-roses {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(233, 30, 99, 0.15),
            0 10px 30px rgba(233, 30, 99, 0.1),
            inset 0 1px 0 rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 50px 50px 60px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-roses:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 80px rgba(233, 30, 99, 0.2);
        }

        /* --- Заголовок --- */
        .main-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 3.2rem;
            background: linear-gradient(135deg, #e91e63, #ad1457, #880e4f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
        }

        .main-title::after {
            content: '🌹';
            font-size: 2.5rem;
            -webkit-text-fill-color: initial;
            margin-left: 12px;
        }

        .subtitle {
            color: #7a4b5c;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            border-bottom: 2px solid rgba(233, 30, 99, 0.2);
            display: inline-block;
            padding-bottom: 8px;
        }

        /* --- Поле ввода (РАСШИРЕН) --- */
        .input-group-roses {
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(233, 30, 99, 0.15);
            transition: all 0.3s ease;
        }

        .input-group-roses:focus-within {
            box-shadow: 0 8px 35px rgba(233, 30, 99, 0.3);
            transform: scale(1.01);
        }

        .input-group-roses input {
            border: 2px solid #f8bbd0;
            border-right: none;
            padding: 24px 32px; /* ← УВЕЛИЧЕН */
            font-size: 1.3rem; /* ← УВЕЛИЧЕН */
            border-radius: 50px 0 0 50px;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            color: #4a1a2e;
            height: 80px; /* ← ФИКСИРОВАННАЯ ВЫСОТА */
        }

        .input-group-roses input:focus {
            border-color: #e91e63;
            background: white;
            outline: none;
            box-shadow: none;
        }

        .input-group-roses input::placeholder {
            color: #b5839a;
            font-weight: 300;
            font-style: italic;
            font-size: 1.1rem;
        }

        .btn-rose {
            border-radius: 0 50px 50px 0;
            padding: 24px 50px; /* ← УВЕЛИЧЕН */
            background: linear-gradient(135deg, #e91e63, #ad1457);
            border: none;
            font-weight: 600;
            font-size: 1.3rem; /* ← УВЕЛИЧЕН */
            letter-spacing: 0.5px;
            color: white;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            height: 80px; /* ← ФИКСИРОВАННАЯ ВЫСОТА */
            min-width: 200px; /* ← МИНИМАЛЬНАЯ ШИРИНА */
        }

        .btn-rose::before {
            content: '🌸';
            margin-right: 8px;
        }

        .btn-rose:hover {
            background: linear-gradient(135deg, #d81b60, #880e4f);
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(233, 30, 99, 0.4);
        }

        .btn-rose:active {
            transform: scale(0.95);
        }

        /* --- Карточка ответа (РАСШИРЕНА) --- */
        .card-answer {
            border: 2px solid #f8bbd0;
            border-radius: 20px;
            background: linear-gradient(135deg, #fff5f7, #fff0f5);
            box-shadow: 0 8px 25px rgba(233, 30, 99, 0.08);
            margin-top: 25px;
            overflow: hidden;
            animation: fadeSlideUp 0.6s ease;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-answer .card-header {
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            border-bottom: 2px solid #f48fb1;
            font-weight: 600;
            color: #7a1a3a;
            padding: 18px 28px; /* ← УВЕЛИЧЕН */
            font-size: 1.2rem; /* ← УВЕЛИЧЕН */
            letter-spacing: 1px;
        }

        .card-answer .card-body {
            padding: 40px 50px; /* ← УВЕЛИЧЕН */
            color: #3d1a2b;
            font-size: 1.2rem; /* ← УВЕЛИЧЕН */
            line-height: 1.8; /* ← УВЕЛИЧЕН */
            max-height: 800px; /* ← УВЕЛИЧЕН */
            overflow-y: auto;
        }

        .card-answer .card-body p {
            margin: 0;
        }

        /* --- Загрузка документа --- */
        .upload-section {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px dashed rgba(233, 30, 99, 0.15);
        }

        .upload-section h5 {
            color: #7a1a3a;
            font-weight: 600;
            letter-spacing: 0.5px;
            font-size: 1.1rem;
        }

        .upload-section h5::before {
            content: '📄 ';
        }

        .input-group-upload {
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.08);
        }

        .input-group-upload input[type="file"] {
            border: 2px solid #f8bbd0;
            border-right: none;
            padding: 18px 28px; /* ← УВЕЛИЧЕН */
            border-radius: 50px 0 0 50px;
            background: rgba(255, 255, 255, 0.85);
            color: #4a1a2e;
            cursor: pointer;
            font-size: 1rem;
            height: 70px; /* ← ФИКСИРОВАННАЯ ВЫСОТА */
        }

        .input-group-upload input[type="file"]::file-selector-button {
            padding: 10px 24px; /* ← УВЕЛИЧЕН */
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #f8bbd0, #f48fb1);
            color: #4a1a2e;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 14px;
            font-size: 1rem;
        }

        .input-group-upload input[type="file"]::file-selector-button:hover {
            background: linear-gradient(135deg, #f48fb1, #e91e63);
            color: white;
        }

        .btn-success-rose {
            border-radius: 0 50px 50px 0;
            padding: 18px 40px; /* ← УВЕЛИЧЕН */
            background: linear-gradient(135deg, #66bb6a, #43a047);
            border: none;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            font-size: 1rem;
            height: 70px; /* ← ФИКСИРОВАННАЯ ВЫСОТА */
            min-width: 160px; /* ← МИНИМАЛЬНАЯ ШИРИНА */
        }

        .btn-success-rose:hover {
            background: linear-gradient(135deg, #43a047, #2e7d32);
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.3);
        }

        /* --- Статус --- */
        .status-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 50px;
            background: linear-gradient(135deg, #f8bbd0, #f48fb1);
            color: #7a1a3a;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 15px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .status-badge.show {
            opacity: 1;
        }

        /* --- Адаптивность --- */
        @media (max-width: 768px) {
            .container {
                max-width: 100%;
                padding-left: 15px;
                padding-right: 15px;
            }

            .main-title {
                font-size: 2.2rem;
            }

            .main-title::after {
                font-size: 1.8rem;
            }

            .card-roses {
                padding: 25px 18px;
                border-radius: 20px;
            }

            .input-group-roses input {
                padding: 14px 18px;
                font-size: 1rem;
                height: 60px;
            }

            .btn-rose {
                padding: 14px 24px;
                font-size: 1rem;
                height: 60px;
                min-width: 120px;
            }

            .card-answer .card-header {
                padding: 14px 20px;
                font-size: 1rem;
            }

            .card-answer .card-body {
                padding: 20px;
                font-size: 1rem;
                max-height: 400px;
            }

            .input-group-upload input[type="file"] {
                height: 50px;
                padding: 10px 16px;
                font-size: 0.9rem;
            }

            .input-group-upload input[type="file"]::file-selector-button {
                padding: 8px 16px;
                font-size: 0.9rem;
            }

            .btn-success-rose {
                height: 50px;
                padding: 10px 20px;
                font-size: 0.9rem;
                min-width: 100px;
            }

            .flower {
                font-size: 2rem !important;
            }

            .flower:nth-child(1) {
                font-size: 2.5rem !important;
            }

            .flower:nth-child(3) {
                font-size: 3rem !important;
            }

            .flower:nth-child(4) {
                font-size: 2.8rem !important;
            }
        }
    </style>
</head>
<body>

<!-- ===== ЦВЕТОЧНЫЙ ФОН ===== -->
<div class="flowers-bg">
    <div class="flower">🌹</div>
    <div class="flower">🌷</div>
    <div class="flower">🌺</div>
    <div class="flower">🌸</div>
    <div class="flower">🌹</div>
    <div class="flower">💐</div>
    <div class="flower">🌷</div>
    <div class="flower">🌺</div>
</div>

<!-- ===== ПАДАЮЩИЕ ЛЕПЕСТКИ ===== -->
<div class="petals">
    <div class="petal">🌸</div>
    <div class="petal">🌹</div>
    <div class="petal">🌷</div>
    <div class="petal">🌸</div>
    <div class="petal">🌹</div>
    <div class="petal">🌷</div>
    <div class="petal">🌸</div>
    <div class="petal">🌹</div>
</div>

<!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12">

            <div class="card-roses">

                <!-- Заголовок -->
                <div class="text-center mb-4">
                    <h1 class="main-title">RAG Assistant</h1>
                    <p class="subtitle">✨ Задай вопрос по загруженным документам ✨</p>
                </div>

                <!-- Сообщение о статусе -->
                <div th:if="${message}" class="alert alert-dismissible fade show mt-3"
                     th:classappend="${message.startsWith('✅') ? 'alert-success' : 'alert-danger'}"
                     role="alert">
                    <span th:text="${message}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <!-- Форма вопроса -->
                <form method="post" action="/ask">
                    <div class="input-group input-group-roses">
                        <input type="text" name="question" class="form-control"
                               placeholder="Введите ваш вопрос..." th:value="${question}" required>
                        <button type="submit" class="btn btn-rose">Отправить</button>
                    </div>
                </form>

                <!-- Ответ -->
                <div th:if="${answer}" class="card-answer">
                    <div class="card-header">📝 Ответ</div>
                    <div class="card-body">
                        <p th:text="${answer}" style="white-space: pre-wrap;"></p>
                    </div>
                </div>

                <!-- Статус -->
                <div th:if="${answer}" class="status-badge show">✅ Ответ получен</div>

                <hr style="border-color: rgba(233,30,99,0.15); margin: 25px 0;">

                <!-- Загрузка документа -->
                <div class="upload-section">
                    <h5>Загрузить документ</h5>
                    <form method="post" action="/api/documents/upload" enctype="multipart/form-data">
                        <div class="input-group input-group-upload">
                            <input type="file" name="file" class="form-control" required>
                            <button type="submit" class="btn btn-success-rose">Загрузить</button>
                        </div>
                    </form>
                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
