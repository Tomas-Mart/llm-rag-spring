<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RAG Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center">🤖 RAG Assistant</h1>
    <p class="text-center text-muted">Задай вопрос по загруженным документам</p>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <form method="post" action="/ask" class="mb-4">
                <div class="input-group">
                    <input type="text" name="question" class="form-control form-control-lg"
                           placeholder="Введите ваш вопрос..." th:value="${question}" required>
                    <button type="submit" class="btn btn-primary btn-lg">Отправить</button>
                </div>
            </form>

            <div th:if="${answer}" class="card">
                <div class="card-header">📝 Ответ</div>
                <div class="card-body">
                    <p th:text="${answer}" style="white-space: pre-wrap;"></p>
                </div>
            </div>

            <hr>

            <h5>📄 Загрузить документ</h5>
            <form method="post" action="/api/documents/upload" enctype="multipart/form-data" class="mt-3">
                <div class="input-group">
                    <input type="file" name="file" class="form-control" required>
                    <button type="submit" class="btn btn-success">Загрузить</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
